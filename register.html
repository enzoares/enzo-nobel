<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Register Member - Ares Cafe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>MEMBER REGISTRATION</h1>
        <p>Join the Luxury Experience</p>
    </header>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="foodmenu.html" class="main-link">BACK TO MENU</a></li>
            <li><a href="register.html" class="main-link" style="color:#c9a96e;">REGISTER</a></li>
            <li><a href="cart.html" class="cart-btn">🛒 CART</a></li>
        </ul>
    </nav>

    <div style="max-width: 450px; margin: 50px auto; background: #1a1a1a; padding: 30px; border: 1px solid #c9a96e; border-radius: 10px;">
        <h2 style="text-align: center; color: #c9a96e; margin-bottom: 20px;">DAFTAR MEMBER</h2>
        <form action="#">
            <div style="margin-bottom: 15px;">
                <label>Nama Lengkap</label>
                <input type="text" placeholder="Masukkan nama..." style="width:100%; padding:10px; margin-top:5px; background:#000; color:#fff; border:1px solid #333;">
            </div>
            <div style="margin-bottom: 15px;">
                <label>Alamat Email</label>
                <input type="email" placeholder="email@contoh.com" style="width:100%; padding:10px; margin-top:5px; background:#000; color:#fff; border:1px solid #333;">
            </div>
            <div style="margin-bottom: 20px;">
                <label>Password</label>
                <input type="password" placeholder="******" style="width:100%; padding:10px; margin-top:5px; background:#000; color:#fff; border:1px solid #333;">
            </div>
            <button type="submit" style="width:100%; padding:12px; background:#c9a96e; border:none; font-weight:bold; cursor:pointer;">DAFTAR SEKARANG</button>
        </form>
        <p style="text-align: center; margin-top: 20px; font-size: 12px; color: #777;">Sudah punya akun? <a href="#" style="color:#c9a96e;">Login di sini</a></p>
    </div>

    <footer><p>&copy; 2026 Ares Cafe Luxury</p></footer>
</body>
</html>
